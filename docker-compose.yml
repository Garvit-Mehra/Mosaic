version: "3.9"

services:
  # --- PostgreSQL Database ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mosaic
      POSTGRES_USER: mosaic
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mosaic_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mosaic"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Redis (rate limiting + caching) ---
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Backend (FastAPI) ---
  backend:
    build:
      context: .
      dockerfile: Backend/Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - Backend/.env
    environment:
      - DATABASE_URL=postgresql://mosaic:${POSTGRES_PASSWORD:-mosaic_dev_password}@postgres:5432/mosaic
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs

  # --- Frontend (Next.js) ---
  frontend:
    build:
      context: Frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - Frontend/.env
    environment:
      - BACKEND_URL=http://backend:8080
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8080
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  backend_logs:
